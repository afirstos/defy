<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>逆命工坊 · 学习游戏</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Serif SC', serif;
    background: #0d0b08;
    color: #e8dcc8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(201,162,39,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 20% 80%, rgba(139,115,85,0.06) 0%, transparent 50%);
    padding: 20px;
  }
  .title {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: clamp(2.2rem, 8vw, 3.5rem);
    color: #c9a227;
    text-shadow: 0 0 40px rgba(201,162,39,0.25);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
  }
  .subtitle {
    font-size: 0.9rem;
    color: #a89880;
    margin-bottom: 50px;
    letter-spacing: 0.3em;
  }
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    width: 100%;
    max-width: 680px;
  }
  .card {
    background: #1a1510;
    border: 1px solid #8b7355;
    border-radius: 16px;
    padding: 28px 24px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .card:hover {
    border-color: #c9a227;
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(201,162,39,0.15);
  }
  .card-icon { font-size: 2.5rem; margin-bottom: 12px; }
  .card-title {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 1.5rem;
    color: #c9a227;
    margin-bottom: 6px;
  }
  .card-desc { font-size: 0.85rem; color: #a89880; line-height: 1.6; margin-bottom: 14px; }
  .card-tag {
    display: inline-block;
    background: rgba(201,162,39,0.12);
    border: 1px solid rgba(201,162,39,0.3);
    color: #c9a227;
    font-size: 0.72rem;
    padding: 3px 10px;
    border-radius: 20px;
    margin-right: 6px;
    margin-bottom: 4px;
  }
  .card-tag.new { background: rgba(201,76,76,0.12); border-color: rgba(201,76,76,0.3); color: #c94c4c; }
  .footer { margin-top: 50px; font-size: 0.75rem; color: #6b5c4a; letter-spacing: 0.1em; }
</style>
</head>
<body>

<div class="title">逆命工坊</div>
<div class="subtitle">以戏为舟 · 学海无涯</div>

<div class="card-grid">

  <a class="card" href="defy-fate-french.html">
    <div class="card-icon">🗼</div>
    <div class="card-title">逆命·法语</div>
    <div class="card-desc">中法互译、答题背词、错题回顾，在楚汉乱世中修炼法语词汇，日积月累功力渐深。</div>
    <span class="card-tag">🇫🇷 法语</span>
    <span class="card-tag">📝 词汇</span>
    <span class="card-tag">🔄 智能复习</span>
  </a>

  <a class="card" href="observer-english.html">
    <div class="card-icon">👁️</div>
    <div class="card-title">观心英语</div>
    <div class="card-desc">以克里希那穆提《生命之书》为原典，触词感知、沉思写作、觉察印记，365日沉浸式修行。</div>
    <span class="card-tag new">🆕 365日课</span>
    <span class="card-tag">🧘 禅意学习</span>
    <span class="card-tag">🔊 语音朗读</span>
  </a>

</div>

<div class="footer">逆命工坊 · 学习游戏合集</div>

</body>
</html>
